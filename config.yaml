# Council — multi-model agent registry
# Enable/disable agents, change models, add new CLIs here.
# Each agent needs: binary, args_before (before prompt), args_after (after prompt).

agents:
  codex:
    enabled: true
    binary: codex
    display_name: "Codex (GPT-5.4)"
    timeout: 300
    args_before:
      - exec
      - --sandbox
      - read-only
      - --full-auto
      - --skip-git-repo-check
      - -m
      - gpt-5.4
      - -c
      - model_reasoning_effort=medium
    args_after: []

  gemini:
    enabled: true
    binary: gemini
    display_name: "Gemini 3.1 Pro"
    timeout: 300
    args_before:
      - -m
      - gemini-3.1-pro-preview
    args_after:
      - --yolo
      - -o
      - text

  # To add a new agent, copy a block above and adjust.
  # Example:
  # qwen:
  #   enabled: true
  #   binary: qwen
  #   display_name: "Qwen Max"
  #   timeout: 300
  #   args_before:
  #     - --model
  #     - qwen-max
  #   args_after: []
