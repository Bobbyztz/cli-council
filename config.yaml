# Council — multi-model agent registry
# Enable/disable agents, change models, add new CLIs here.
# Each agent needs: binary, args_before (before prompt), args_after (after prompt).
#
# heartbeat_interval: seconds between status snapshots printed to stderr AND
# appended to /tmp/council-{pid}/heartbeat.log. Set lower (e.g. 10) for
# interactive debugging, higher (e.g. 60) for long runs. Default 30.

heartbeat_interval: 30

# Error handling policy — governs per-agent retry/skip behavior on failure.
# Applies only to agents that exit non-zero or produce empty output.
# Successful agents are never retried.
#
# network: transient connectivity failures (DNS, TCP, TLS, proxy, socket).
#   retry N times with exponential-ish backoff; if still failing, final state=error.
# quota: rate-limit / billing / resource-exhausted errors.
#   skip immediately (state=skipped), do NOT retry. The other agent still runs.
#   Caller (Claude) treats `skipped` as "this agent unavailable this round",
#   not as audit failure. Audit fails only if ALL agents end in non-completed.
# other: unclassified errors — preserved as state=error, no retry.
error_policy:
  network:
    retry: 3
    backoff_s: [2, 5, 15]  # seconds between attempts; last value reused if retries exceed list
  quota:
    retry: 0
  other:
    retry: 0

# Classification patterns — applied case-insensitive against stderr tail + last 4KB of stdout.
# Quota is checked BEFORE network (more specific). First match wins.
# If you see a real error being misclassified, add/remove a pattern here rather
# than patching the classifier code.
error_patterns:
  quota:
    - "rate.?limit"
    - "\\b429\\b"
    - "quota"
    - "too many requests"
    - "resource.exhausted"
    - "insufficient.quota"
    - "daily limit"
    - "monthly limit"
    - "usage limit"
    - "billing"
  network:
    - "connection refused"
    - "connection reset"
    - "connection timed out"
    - "network is unreachable"
    - "no route to host"
    - "name or service not known"
    - "temporary failure in name resolution"
    - "getaddrinfo"
    - "dns.*(fail|error|lookup)"
    - "ssl.*(handshake|error)"
    - "tls.*(handshake|error)"
    - "eof occurred"
    - "read timeout"
    - "econnreset"
    - "econnrefused"
    - "ehostunreach"
    - "enetunreach"
    - "\\b50[234]\\b"  # 502/503/504 upstream/gateway

agents:
  codex:
    enabled: true
    binary: codex
    display_name: "Codex (GPT-5.5)"
    timeout: 750
    args_before:
      - exec
      - --sandbox
      - read-only
      - --full-auto
      - --skip-git-repo-check
      - -m
      - gpt-5.5
      - -c
      - model_reasoning_effort=medium
    args_after: []

  gemini:
    enabled: true
    binary: gemini
    display_name: "Gemini 2.5 Pro"
    timeout: 600
    transcript_mode: file  # bypass ARG_MAX; Gemini reads transcript from disk via tool call
    args_before:
      - -m
      - gemini-2.5-pro
    args_after:
      - --yolo
      - -o
      - text
    # Sycophancy-aware prefix v2: uses Gemini's agreement bias as fuel
    # rather than fighting it. Three anti-fabrication layers:
    #   (a) quote + surrounding context (defends against cherry-pick)
    #   (b) paraphrase commitment (forces a checkable interpretation)
    #   (c) severity bound to decision impact (no vibes scoring)
    # Optimizes for signal density; Claude verifies downstream.
    prompt_prefix: |
      The user reviewing this session believes there ARE problems they have
      not yet identified. Your job is to confirm and sharpen their suspicion.
      Default assumption: this work is flawed in ways the participants did
      not catch.

      For EACH concern, output exactly this structure:

        QUOTE:
        > <verbatim text from the session, INCLUDING 3-5 lines of surrounding
        > context, prefixed with > on every line. Single-line quotes are
        > insufficient because they permit cherry-picking.>

        PARAPHRASE: <one sentence — what do the participants seem to be
        claiming or deciding in this passage? This commits you to an
        interpretation that the user can check.>

        PROBLEM: <one sentence — what is wrong with that claim or decision?>

        SEVERITY: <one of>
          HIGH    — would change a decision the participants made
          MEDIUM  — would change the participants' confidence in a decision
          LOW     — procedural / stylistic / minor

      Coverage > caution. The user has a downstream verification step.
      List every concern you can ground in a quote+paraphrase+problem
      triple, including borderline ones. The user will filter.

      Hard rules:
      - No quote-with-context = drop the concern. Single-line quote alone
        is insufficient.
      - The paraphrase must be defensible against the surrounding context.
        If the surrounding context contradicts your paraphrase, drop the
        concern instead of forcing it.
      - Do not echo vocabulary the session uses to describe its own
        failure modes. Find issues from your own reading, not by repeating
        labels the participants already applied.
      - Do not use sycophantic phrases ("looks great", "solid",
        "comprehensive", "总体不错", "做得很好"). The user already has a
        mirror.

      End with ONE different-angle observation, only if it would change a
      decision the participants made. Otherwise omit this section.

  # To add a new agent, copy a block above and adjust.
  # Example:
  # qwen:
  #   enabled: true
  #   binary: qwen
  #   display_name: "Qwen Max"
  #   timeout: 300
  #   args_before:
  #     - --model
  #     - qwen-max
  #   args_after: []
